name: IHC Daily Integrity Check

"on":
  schedule:
    - cron: "0 21 * * *" # 06:00 JST
  workflow_dispatch:
    inputs:
      target_date:
        description: "Date to check (YYYY-MM-DD). Default: yesterday in JST"
        required: false
        type: string
      dry_run:
        description: "Skip workflow dispatches and only print actions"
        required: false
        default: false
        type: boolean

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      TZ: Asia/Tokyo
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --upgrade supabase requests
      - name: Check and backfill if needed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_DATE: ${{ inputs.target_date }}
          DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_REF: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ihc_daily_integrity_check.py
