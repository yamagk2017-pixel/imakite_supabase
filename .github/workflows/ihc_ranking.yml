name: IHC Ranking to Supabase

on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: 'Override snapshot date (YYYY-MM-DD)'
        required: false
        type: string
      reset_daily_top20:
        description: 'Reset daily_top20 rows for snapshot_date before save'
        required: false
        default: true
        type: boolean
  workflow_run:
    workflows: ["IHC Snapshot to Supabase"]
    types:
      - completed

jobs:
  run:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --upgrade supabase pandas requests
      - name: Run ranking job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SNAPSHOT_DATE: ${{ inputs.snapshot_date }}
          RESET_DAILY_TOP20: ${{ inputs.reset_daily_top20 }}
          GROUP_NAMES_CHUNK_SIZE: "50"
        run: python scripts/ihc_ranking_job.py
